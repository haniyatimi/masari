<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#000000">
  <title>Masari | لوحة التحكم</title>
  <style>
:root{
  --black:#000000;
  --panel:#111111;
  --panel-2:#171717;
  --line:#2b2b2b;
  --white:#ffffff;
  --muted:#a8a8a8;
  --violet:#7D39EB;
  --lime:#C6FF33;
  --neutral:#292929;
  --shadow:0 24px 80px rgba(0,0,0,.45);
}

*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0;
  min-height:100vh;
  font-family:"Segoe UI",Tahoma,Arial,sans-serif;
  background:var(--black);
  color:var(--white);
}
button,input,select{font:inherit}
button{cursor:pointer}
.hidden{display:none!important}
a{text-decoration:none;color:inherit}

.auth-page{
  background:
    radial-gradient(circle at 15% 15%,rgba(125,57,235,.23),transparent 30%),
    radial-gradient(circle at 90% 85%,rgba(198,255,51,.10),transparent 27%),
    #000;
}
.auth-layout{
  min-height:100vh;
  display:grid;
  grid-template-columns:1.15fr .85fr;
}
.auth-visual{
  position:relative;
  overflow:hidden;
  padding:44px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  background:
    linear-gradient(145deg,rgba(0,0,0,.25),rgba(0,0,0,.72)),
    radial-gradient(circle at 70% 30%,rgba(125,57,235,.40),transparent 28%),
    #080808;
}
.auth-visual::after{
  content:"";
  position:absolute;
  width:520px;height:520px;
  border:80px solid rgba(198,255,51,.08);
  border-radius:50%;
  left:-130px;bottom:-180px;
}
.brand-lockup,.mobile-brand{
  display:flex;align-items:center;gap:13px
}
.brand-logo{width:48px;height:48px}
.brand-lockup h1{margin:0;font-size:28px}
.brand-lockup p{margin:3px 0 0;color:var(--muted)}
.visual-copy{position:relative;z-index:1;max-width:690px}
.eyebrow{
  display:inline-block;
  color:var(--lime);
  font-size:12px;
  font-weight:900;
  letter-spacing:1.5px;
  margin-bottom:12px;
}
.visual-copy h2{
  margin:0;
  font-size:clamp(42px,6vw,82px);
  line-height:1.02;
  letter-spacing:-3px;
}
.visual-copy p{
  max-width:600px;
  color:#c9c9c9;
  font-size:17px;
  line-height:1.9;
}
.visual-card{
  position:relative;z-index:1;
  max-width:500px;
  border:1px solid #2f2f2f;
  border-radius:22px;
  padding:18px;
  background:rgba(17,17,17,.82);
  backdrop-filter:blur(16px);
}
.visual-card>div:first-child{
  display:flex;justify-content:space-between;align-items:center
}
.visual-card span{color:var(--muted)}
.visual-card strong{font-size:28px;color:var(--lime)}
.mini-track{display:grid;grid-template-columns:repeat(8,1fr);gap:7px;margin-top:14px}
.mini-track i{height:9px;border-radius:999px;background:#303030}
.mini-track i.done{background:var(--lime)}
.mini-track i.missed{background:var(--violet)}

.auth-panel{display:grid;place-items:center;padding:28px}
.auth-card{
  width:min(470px,100%);
  border:1px solid var(--line);
  border-radius:28px;
  padding:28px;
  background:rgba(17,17,17,.96);
  box-shadow:var(--shadow);
}
.mobile-brand{display:none;margin-bottom:22px}
.mobile-brand img{width:38px}
.auth-tabs{
  display:grid;grid-template-columns:1fr 1fr;
  gap:7px;padding:5px;
  background:#0a0a0a;border:1px solid var(--line);border-radius:14px
}
.auth-tab{
  border:0;background:transparent;color:var(--muted);
  padding:10px;border-radius:10px;font-weight:800
}
.auth-tab.active{background:var(--violet);color:#fff}
.auth-heading{margin:26px 0 20px}
.auth-heading h2{margin:0 0 8px;font-size:30px}
.auth-heading p,.local-note{color:var(--muted);line-height:1.7}
.local-note{font-size:12px;margin:16px 0 0}
.field{margin-bottom:15px}
.field label{display:block;margin-bottom:7px;color:#d7d7d7;font-size:13px}
.field input{
  width:100%;
  border:1px solid #333;
  background:#090909;color:#fff;
  border-radius:13px;padding:13px;outline:none
}
.field input:focus{
  border-color:var(--violet);
  box-shadow:0 0 0 3px rgba(125,57,235,.16)
}
.primary-btn{
  border:0;
  background:var(--violet);color:#fff;
  border-radius:13px;padding:13px 18px;
  font-weight:900;
}
.primary-btn:hover{filter:brightness(1.08)}
.primary-btn.compact{padding:10px 14px}
.ghost-btn,.danger-btn{
  border:1px solid #333;background:#151515;color:#fff;
  border-radius:12px;padding:10px 13px
}
.ghost-btn.full{width:100%}
.danger-btn{color:var(--lime)}

.app-shell{
  min-height:100vh;
  display:grid;
  grid-template-columns:245px minmax(0,1fr);
}
.sidebar{
  position:sticky;top:0;height:100vh;
  padding:22px;
  border-left:1px solid var(--line);
  background:#090909;
  display:flex;flex-direction:column;
}
.sidebar-brand{
  display:flex;align-items:center;gap:11px;
  font-size:22px;font-weight:900
}
.sidebar-brand img{width:38px}
.sidebar-nav{display:grid;gap:8px;margin-top:34px}
.nav-item{
  border:0;background:transparent;color:var(--muted);
  text-align:right;padding:12px 13px;border-radius:12px;font-weight:800
}
.nav-item:hover,.nav-item.active{
  background:#211336;color:var(--lime)
}
.sidebar-user{
  margin-top:auto;
  display:flex;align-items:center;gap:11px;
  padding:13px 0;
}
.sidebar-user strong,.sidebar-user span{display:block}
.sidebar-user span{color:var(--muted);font-size:11px;margin-top:3px}
.user-avatar{
  width:43px;height:43px;border-radius:13px;
  display:grid;place-items:center;
  background:var(--violet);
  color:#fff;font-weight:900
}
.dashboard-main{
  min-width:0;
  padding:28px;
  background:
    radial-gradient(circle at 100% 0%,rgba(125,57,235,.13),transparent 25%),
    #000;
}
.dashboard-header{
  display:flex;justify-content:space-between;align-items:flex-start;
  gap:18px;flex-wrap:wrap
}
.dashboard-header h1{margin:0;font-size:38px;letter-spacing:-1px}
.dashboard-header p{color:var(--muted);margin:7px 0 0}
.header-actions{display:flex;gap:9px;flex-wrap:wrap}
.select-control{
  border:1px solid #333;background:#111;color:#fff;
  border-radius:12px;padding:10px 12px
}
.summary-grid{
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:12px;margin:24px 0
}
.summary-card{
  min-height:120px;border-radius:20px;padding:18px;
  border:1px solid var(--line);
  display:flex;flex-direction:column;justify-content:space-between
}
.summary-card span{font-size:13px}
.summary-card strong{font-size:34px}
.summary-card.lime{background:var(--lime);color:#000;border-color:var(--lime)}
.summary-card.violet{background:var(--violet);color:#fff;border-color:var(--violet)}
.summary-card.dark{background:#111}

.panel{
  margin-top:16px;
  border:1px solid var(--line);
  border-radius:24px;
  padding:18px;
  background:#0d0d0d;
}
.panel-head{
  display:flex;justify-content:space-between;align-items:center;
  gap:12px;flex-wrap:wrap;margin-bottom:16px
}
.panel-head h2{margin:0;font-size:22px}
.panel-head p{margin:5px 0 0;color:var(--muted);font-size:13px}
.status-switch{
  display:flex;gap:7px;padding:5px;
  border-radius:13px;background:#050505;border:1px solid var(--line)
}
.status-btn{
  border:0;background:transparent;color:var(--muted);
  padding:9px 13px;border-radius:9px;font-weight:900
}
.status-btn.done.active{background:var(--lime);color:#000}
.status-btn.missed.active{background:var(--violet);color:#fff}

.tracker-layout{
  display:grid;
  grid-template-columns:175px minmax(0,1fr);
  gap:14px;
  align-items:start
}
.compact-habits{display:grid;gap:8px}
.habit-item{
  display:grid;
  grid-template-columns:32px minmax(0,1fr);
  gap:8px;align-items:center;
  border:1px solid #2d2d2d;
  background:#111;
  border-radius:13px;
  padding:8px;
  cursor:pointer;
  transition:.18s
}
.habit-item:hover{border-color:var(--violet);transform:translateY(-1px)}
.habit-index{
  width:30px;height:30px;border-radius:9px;
  display:grid;place-items:center;
  background:#211336;color:var(--lime);
  font-size:11px;font-weight:900
}
.habit-copy{min-width:0}
.habit-copy strong,.habit-copy span{
  display:block;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis
}
.habit-copy strong{font-size:12px}
.habit-copy span{font-size:9px;color:var(--muted);margin-top:2px}

.track-stage{
  min-width:0;
  border:1px solid #292929;
  border-radius:24px;
  background:
    radial-gradient(circle at 58% 48%,rgba(125,57,235,.18),transparent 34%),
    #070707;
  overflow:hidden;
}
#trackerSvg{
  width:100%;
  height:auto;
  display:block;
}
.track-segment{cursor:pointer;transition:.15s}
.track-segment:hover{filter:brightness(1.15)}
.day-label{fill:#d3d3d3;font-size:12px;font-weight:900;pointer-events:none}
.lane-number{fill:var(--lime);font-size:13px;font-weight:900;pointer-events:none}
.center-disc{fill:#0d0d0d;stroke:#333;stroke-width:2}
.center-progress{fill:none;stroke:var(--violet);stroke-width:9;stroke-linecap:round}
.center-month{fill:#fff;font-size:34px;font-weight:900}
.center-rate{fill:var(--lime);font-size:26px;font-weight:900}
.center-sub{fill:#aaa;font-size:13px}

.analytics-list{display:grid;gap:11px}
.analytics-row{
  display:grid;grid-template-columns:170px 1fr 55px;
  gap:12px;align-items:center
}
.analytics-name{
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:13px
}
.analytics-track{height:11px;background:#272727;border-radius:999px;overflow:hidden}
.analytics-fill{height:100%;background:linear-gradient(90deg,var(--violet),var(--lime));border-radius:999px}
.analytics-value{font-size:12px;color:var(--muted);text-align:left}

.modal{
  position:fixed;inset:0;z-index:50;
  display:grid;place-items:center;padding:18px;
  background:rgba(0,0,0,.72);
}
.modal-card{
  width:min(520px,100%);
  border:1px solid #333;border-radius:24px;
  padding:22px;background:#111;box-shadow:var(--shadow)
}
.modal-head{
  display:flex;justify-content:space-between;align-items:center;margin-bottom:20px
}
.modal-head h2{margin:0}
.icon-btn{
  width:36px;height:36px;border-radius:10px;
  border:1px solid #333;background:#171717;color:#fff;font-size:22px
}
.modal-actions{display:flex;justify-content:flex-end;gap:9px;margin-top:18px}
.profile-form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.profile-form-grid .full{grid-column:1/-1}

.toast{
  position:fixed;bottom:22px;left:50%;
  transform:translate(-50%,25px);
  opacity:0;pointer-events:none;
  background:var(--lime);color:#000;
  padding:11px 16px;border-radius:12px;font-weight:900;
  transition:.2s;z-index:90
}
.toast.show{opacity:1;transform:translate(-50%,0)}

@media(max-width:1050px){
  .auth-layout{grid-template-columns:1fr}
  .auth-visual{display:none}
  .mobile-brand{display:flex}
  .app-shell{grid-template-columns:1fr}
  .sidebar{
    position:static;height:auto;border-left:0;border-bottom:1px solid var(--line)
  }
  .sidebar-nav{grid-template-columns:repeat(3,1fr);margin:18px 0}
  .sidebar-user{margin-top:0}
  .summary-grid{grid-template-columns:1fr 1fr}
}
@media(max-width:760px){
  .dashboard-main{padding:14px}
  .tracker-layout{grid-template-columns:1fr}
  .compact-habits{grid-template-columns:repeat(2,minmax(0,1fr))}
  .summary-grid{grid-template-columns:1fr 1fr}
  .header-actions{width:100%}
  .select-control{flex:1}
}
@media(max-width:520px){
  .auth-panel{padding:12px}
  .auth-card{padding:20px;border-radius:20px}
  .summary-grid{grid-template-columns:1fr}
  .compact-habits{grid-template-columns:1fr}
  .sidebar-nav{grid-template-columns:1fr}
  .profile-form-grid{grid-template-columns:1fr}
  .profile-form-grid .full{grid-column:auto}
}
</style>
</head>
<body class="dashboard-page">
  <div class="app-shell">
    <aside class="sidebar">
      <a class="sidebar-brand" href="dashboard.html">
        <img src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIiByb2xlPSJpbWciIGFyaWEtbGFiZWxsZWRieT0idGl0bGUiPgogIDx0aXRsZT5NYXNhcmk8L3RpdGxlPgogIDxyZWN0IHdpZHRoPSIxMDAiIGhlaWdodD0iMTAwIiByeD0iMjgiIGZpbGw9IiM3RDM5RUIiLz4KICA8cGF0aCBkPSJNMjMgNjlWMzFoMTJsMTUgMTkgMTUtMTloMTJ2MzhINjRWNTBMNTAgNjcgMzYgNTB2MTlIMjNaIiBmaWxsPSIjRkZGRkZGIi8+CiAgPGNpcmNsZSBjeD0iNzciIGN5PSIyMyIgcj0iOSIgZmlsbD0iI0M2RkYzMyIvPgo8L3N2Zz4=" alt="Masari">
        <span>Masari</span>
      </a>

      <nav class="sidebar-nav">
        <button class="nav-item active" data-target="trackerSection">المضمار</button>
        <button class="nav-item" data-target="statsSection">الإحصائيات</button>
        <button class="nav-item" id="profileBtn">الحساب الشخصي</button>
      </nav>

      <div class="sidebar-user">
        <div class="user-avatar" id="userInitial">M</div>
        <div>
          <strong id="userName">مستخدم</strong>
          <span id="userEmail">—</span>
        </div>
      </div>

      <button id="logoutBtn" class="ghost-btn full">تسجيل الخروج</button>
    </aside>

    <main class="dashboard-main">
      <header class="dashboard-header">
        <div>
          <span class="eyebrow">MASARI DASHBOARD</span>
          <h1>لوحة المتابعة</h1>
          <p>اختر الحالة، ثم اضغط على يوم داخل المضمار.</p>
        </div>

        <div class="header-actions">
          <select id="monthSelect" class="select-control"></select>
          <select id="yearSelect" class="select-control"></select>
          <button id="addHabitBtn" class="primary-btn compact">إضافة عادة</button>
        </div>
      </header>

      <section class="summary-grid">
        <article class="summary-card lime">
          <span>نسبة الالتزام</span>
          <strong id="summaryRate">0%</strong>
        </article>
        <article class="summary-card violet">
          <span>أيام منجزة</span>
          <strong id="summaryDone">0</strong>
        </article>
        <article class="summary-card dark">
          <span>عدد العادات</span>
          <strong id="summaryHabits">0</strong>
        </article>
        <article class="summary-card dark">
          <span>أفضل سلسلة</span>
          <strong id="summaryStreak">0</strong>
        </article>
      </section>

      <section id="trackerSection" class="panel tracker-panel">
        <div class="panel-head">
          <div>
            <h2>مضمار العادات</h2>
            <p>القائمة ضيقة والمضمار يأخذ المساحة الأساسية.</p>
          </div>
          <div class="status-switch">
            <button class="status-btn done active" data-mode="done">منجز</button>
            <button class="status-btn missed" data-mode="missed">غير منجز</button>
          </div>
        </div>

        <div class="tracker-layout">
          <aside id="habitList" class="compact-habits"></aside>

          <div class="track-stage">
            <svg id="trackerSvg" viewBox="0 0 1400 900" role="img" aria-label="مضمار العادات"></svg>
          </div>
        </div>
      </section>

      <section id="statsSection" class="panel">
        <div class="panel-head">
          <div>
            <h2>تحليل سريع</h2>
            <p>نسبة الإنجاز لكل عادة.</p>
          </div>
        </div>
        <div id="habitAnalytics" class="analytics-list"></div>
      </section>
    </main>
  </div>

  <div id="habitModal" class="modal hidden">
    <div class="modal-card">
      <div class="modal-head">
        <h2 id="habitModalTitle">إضافة عادة</h2>
        <button id="closeHabitModal" class="icon-btn" aria-label="إغلاق">×</button>
      </div>

      <div class="field">
        <label for="habitName">اسم العادة</label>
        <input id="habitName" type="text" placeholder="مثال: قراءة 20 صفحة">
      </div>

      <div class="field">
        <label for="habitDescription">الوصف المختصر</label>
        <input id="habitDescription" type="text" placeholder="اختياري">
      </div>

      <div class="modal-actions">
        <button id="deleteHabitBtn" class="danger-btn hidden">حذف</button>
        <button id="saveHabitBtn" class="primary-btn compact">حفظ</button>
      </div>
    </div>
  </div>

  <div id="profileModal" class="modal hidden">
    <div class="modal-card">
      <div class="modal-head">
        <h2>الحساب الشخصي</h2>
        <button id="closeProfileModal" class="icon-btn" aria-label="إغلاق">×</button>
      </div>

      <div class="profile-form-grid">
        <div class="field">
          <label for="profileName">الاسم</label>
          <input id="profileName" type="text">
        </div>
        <div class="field">
          <label for="profilePhone">رقم الهاتف</label>
          <input id="profilePhone" type="text">
        </div>
        <div class="field full">
          <label for="profileAddress">العنوان</label>
          <input id="profileAddress" type="text">
        </div>
      </div>

      <div class="modal-actions">
        <button id="saveProfileBtn" class="primary-btn compact">حفظ</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>
  <script>
(() => {
  "use strict";

  const usersKey = "masari_v2_users";
  const sessionKey = "masari_v2_session";
  const months = [
    "يناير","فبراير","مارس","أبريل","مايو","يونيو",
    "يوليو","أغسطس","سبتمبر","أكتوبر","نوفمبر","ديسمبر"
  ];

  const defaultHabits = [
    { name: "الاستيقاظ مبكرًا", description: "قبل الساعة 6:00" },
    { name: "صلاة الفجر", description: "في وقتها" },
    { name: "قراءة", description: "20 صفحة يوميًا" },
    { name: "تمرين رياضي", description: "45 دقيقة" },
    { name: "شرب الماء", description: "8 أكواب" },
    { name: "نوم مبكر", description: "قبل 11 مساءً" }
  ];

  const sessionEmail = localStorage.getItem(sessionKey);
  const users = getUsers();

  if (!sessionEmail || !users[sessionEmail]) {
    window.location.href = "index.html";
    return;
  }

  let user = users[sessionEmail];
  let selectedMode = "done";
  let editingHabitIndex = null;
  let selectedMonth = new Date().getMonth();
  let selectedYear = new Date().getFullYear();
  let state = loadState();

  const els = {
    userName: document.getElementById("userName"),
    userEmail: document.getElementById("userEmail"),
    userInitial: document.getElementById("userInitial"),
    logoutBtn: document.getElementById("logoutBtn"),
    monthSelect: document.getElementById("monthSelect"),
    yearSelect: document.getElementById("yearSelect"),
    addHabitBtn: document.getElementById("addHabitBtn"),
    habitList: document.getElementById("habitList"),
    trackerSvg: document.getElementById("trackerSvg"),
    habitAnalytics: document.getElementById("habitAnalytics"),
    summaryRate: document.getElementById("summaryRate"),
    summaryDone: document.getElementById("summaryDone"),
    summaryHabits: document.getElementById("summaryHabits"),
    summaryStreak: document.getElementById("summaryStreak"),
    habitModal: document.getElementById("habitModal"),
    habitModalTitle: document.getElementById("habitModalTitle"),
    closeHabitModal: document.getElementById("closeHabitModal"),
    habitName: document.getElementById("habitName"),
    habitDescription: document.getElementById("habitDescription"),
    saveHabitBtn: document.getElementById("saveHabitBtn"),
    deleteHabitBtn: document.getElementById("deleteHabitBtn"),
    profileBtn: document.getElementById("profileBtn"),
    profileModal: document.getElementById("profileModal"),
    closeProfileModal: document.getElementById("closeProfileModal"),
    profileName: document.getElementById("profileName"),
    profilePhone: document.getElementById("profilePhone"),
    profileAddress: document.getElementById("profileAddress"),
    saveProfileBtn: document.getElementById("saveProfileBtn"),
    toast: document.getElementById("toast")
  };

  initialise();

  function getUsers() {
    try {
      return JSON.parse(localStorage.getItem(usersKey) || "{}");
    } catch {
      return {};
    }
  }

  function saveUsers(nextUsers) {
    localStorage.setItem(usersKey, JSON.stringify(nextUsers));
  }

  function dataKey() {
    return `masari_v2_data:${sessionEmail}:${selectedYear}-${selectedMonth}`;
  }

  function loadState() {
    try {
      const saved = JSON.parse(localStorage.getItem(dataKey()) || "null");
      if (saved && Array.isArray(saved.habits) && saved.checks) {
        return saved;
      }
    } catch {
      // Use defaults.
    }

    return {
      habits: structuredCloneSafe(defaultHabits),
      checks: {}
    };
  }

  function saveState() {
    localStorage.setItem(dataKey(), JSON.stringify(state));
  }

  function structuredCloneSafe(value) {
    return JSON.parse(JSON.stringify(value));
  }

  function showToast(message) {
    els.toast.textContent = message;
    els.toast.classList.add("show");
    window.setTimeout(() => els.toast.classList.remove("show"), 1700);
  }

  function initialise() {
    renderUser();
    buildSelectors();
    bindEvents();
    renderAll();
  }

  function renderUser() {
    els.userName.textContent = user.name || "مستخدم";
    els.userEmail.textContent = user.email;
    els.userInitial.textContent = (user.name || "M").trim().charAt(0).toUpperCase();
  }

  function buildSelectors() {
    els.monthSelect.innerHTML = "";
    months.forEach((month, index) => {
      const option = document.createElement("option");
      option.value = String(index);
      option.textContent = month;
      els.monthSelect.appendChild(option);
    });

    els.yearSelect.innerHTML = "";
    for (let year = 2025; year <= 2035; year += 1) {
      const option = document.createElement("option");
      option.value = String(year);
      option.textContent = String(year);
      els.yearSelect.appendChild(option);
    }

    els.monthSelect.value = String(selectedMonth);
    els.yearSelect.value = String(selectedYear);
  }

  function bindEvents() {
    els.logoutBtn.addEventListener("click", () => {
      localStorage.removeItem(sessionKey);
      window.location.href = "index.html";
    });

    els.monthSelect.addEventListener("change", () => {
      selectedMonth = Number(els.monthSelect.value);
      state = loadState();
      renderAll();
    });

    els.yearSelect.addEventListener("change", () => {
      selectedYear = Number(els.yearSelect.value);
      state = loadState();
      renderAll();
    });

    document.querySelectorAll(".status-btn").forEach((button) => {
      button.addEventListener("click", () => {
        document.querySelectorAll(".status-btn").forEach((item) => item.classList.remove("active"));
        button.classList.add("active");
        selectedMode = button.dataset.mode;
      });
    });

    document.querySelectorAll(".nav-item[data-target]").forEach((button) => {
      button.addEventListener("click", () => {
        document.querySelectorAll(".nav-item").forEach((item) => item.classList.remove("active"));
        button.classList.add("active");
        document.getElementById(button.dataset.target)?.scrollIntoView({ behavior: "smooth" });
      });
    });

    els.addHabitBtn.addEventListener("click", () => openHabitModal(null));
    els.closeHabitModal.addEventListener("click", closeHabitModal);
    els.saveHabitBtn.addEventListener("click", saveHabit);
    els.deleteHabitBtn.addEventListener("click", deleteHabit);

    els.profileBtn.addEventListener("click", openProfileModal);
    els.closeProfileModal.addEventListener("click", closeProfileModal);
    els.saveProfileBtn.addEventListener("click", saveProfile);
  }

  function renderAll() {
    renderHabitList();
    renderTracker();
    renderAnalytics();
    renderSummary();
  }

  function renderHabitList() {
    els.habitList.innerHTML = "";

    state.habits.forEach((habit, index) => {
      const item = document.createElement("button");
      item.className = "habit-item";
      item.type = "button";
      item.innerHTML = `
        <span class="habit-index">${index + 1}</span>
        <span class="habit-copy">
          <strong>${escapeHtml(habit.name)}</strong>
          <span>${escapeHtml(habit.description || "بدون وصف")}</span>
        </span>
      `;
      item.addEventListener("click", () => openHabitModal(index));
      els.habitList.appendChild(item);
    });
  }

  function renderTracker() {
    const svg = els.trackerSvg;
    svg.innerHTML = "";

    const cx = 860;
    const cy = 455;
    const startAngle = -150;
    const endAngle = 150;
    const totalAngle = endAngle - startAngle;
    const innerRadius = 145;
    const outerRadius = 440;
    const habitCount = Math.max(state.habits.length, 1);
    const laneWidth = (outerRadius - innerRadius) / habitCount;
    const dayCount = 31;
    const gap = 0.62;

    state.habits.forEach((habit, habitIndex) => {
      const r1 = innerRadius + habitIndex * laneWidth + 5;
      const r2 = innerRadius + (habitIndex + 1) * laneWidth - 5;

      for (let day = 1; day <= dayCount; day += 1) {
        const a0 = startAngle + ((day - 1) * totalAngle) / dayCount + gap / 2;
        const a1 = startAngle + (day * totalAngle) / dayCount - gap / 2;
        const status = state.checks[`${habitIndex}-${day}`];

        const segment = createSvg("path", {
          d: arcPath(cx, cy, r1, r2, a0, a1),
          fill: status === "done" ? "#C6FF33" : status === "missed" ? "#7D39EB" : "#292929",
          stroke: "#3a3a3a",
          "stroke-width": "0.8",
          class: "track-segment"
        });

        segment.addEventListener("click", () => {
          state.checks[`${habitIndex}-${day}`] = selectedMode;
          saveState();
          renderAll();
        });

        svg.appendChild(segment);
      }

      const laneMid = (r1 + r2) / 2;
      const point = polar(cx, cy, laneMid, 180);

      const badge = createSvg("circle", {
        cx: point.x - 22,
        cy: point.y,
        r: 14,
        fill: "#211336",
        stroke: "#7D39EB",
        "stroke-width": "1.2"
      });
      svg.appendChild(badge);

      const number = createSvg("text", {
        x: point.x - 22,
        y: point.y + 4,
        "text-anchor": "middle",
        class: "lane-number"
      });
      number.textContent = String(habitIndex + 1);
      svg.appendChild(number);
    });

    for (let day = 1; day <= dayCount; day += 1) {
      const angle = startAngle + ((day - 0.5) * totalAngle) / dayCount;
      const point = polar(cx, cy, 470, angle);
      const label = createSvg("text", {
        x: point.x,
        y: point.y,
        "text-anchor": "middle",
        "dominant-baseline": "middle",
        class: "day-label"
      });
      label.textContent = String(day);
      svg.appendChild(label);
    }

    svg.appendChild(createSvg("circle", {
      cx,
      cy,
      r: 112,
      class: "center-disc"
    }));

    const total = state.habits.length * dayCount;
    const done = countStatus("done");
    const rate = total ? Math.round((done / total) * 100) : 0;
    const circumference = 2 * Math.PI * 126;

    svg.appendChild(createSvg("circle", {
      cx,
      cy,
      r: 126,
      class: "center-progress",
      "stroke-dasharray": String(circumference),
      "stroke-dashoffset": String(circumference * (1 - rate / 100)),
      transform: `rotate(-90 ${cx} ${cy})`
    }));

    const month = createSvg("text", {
      x: cx,
      y: cy - 23,
      "text-anchor": "middle",
      class: "center-month"
    });
    month.textContent = months[selectedMonth];
    svg.appendChild(month);

    const rateText = createSvg("text", {
      x: cx,
      y: cy + 20,
      "text-anchor": "middle",
      class: "center-rate"
    });
    rateText.textContent = `${rate}%`;
    svg.appendChild(rateText);

    const sub = createSvg("text", {
      x: cx,
      y: cy + 51,
      "text-anchor": "middle",
      class: "center-sub"
    });
    sub.textContent = `${selectedYear} — معدل الالتزام`;
    svg.appendChild(sub);
  }

  function renderAnalytics() {
    els.habitAnalytics.innerHTML = "";

    state.habits.forEach((habit, habitIndex) => {
      let done = 0;
      for (let day = 1; day <= 31; day += 1) {
        if (state.checks[`${habitIndex}-${day}`] === "done") {
          done += 1;
        }
      }

      const rate = Math.round((done / 31) * 100);
      const row = document.createElement("div");
      row.className = "analytics-row";
      row.innerHTML = `
        <span class="analytics-name">${escapeHtml(habit.name)}</span>
        <span class="analytics-track"><span class="analytics-fill" style="width:${rate}%"></span></span>
        <span class="analytics-value">${rate}%</span>
      `;
      els.habitAnalytics.appendChild(row);
    });
  }

  function renderSummary() {
    const total = state.habits.length * 31;
    const done = countStatus("done");
    const rate = total ? Math.round((done / total) * 100) : 0;

    els.summaryRate.textContent = `${rate}%`;
    els.summaryDone.textContent = String(done);
    els.summaryHabits.textContent = String(state.habits.length);
    els.summaryStreak.textContent = String(calculateBestStreak());
  }

  function countStatus(status) {
    return Object.values(state.checks).filter((value) => value === status).length;
  }

  function calculateBestStreak() {
    let best = 0;

    state.habits.forEach((habit, habitIndex) => {
      let current = 0;
      for (let day = 1; day <= 31; day += 1) {
        if (state.checks[`${habitIndex}-${day}`] === "done") {
          current += 1;
          best = Math.max(best, current);
        } else {
          current = 0;
        }
      }
    });

    return best;
  }

  function openHabitModal(index) {
    editingHabitIndex = index;
    const isEditing = index !== null;
    const habit = isEditing ? state.habits[index] : { name: "", description: "" };

    els.habitModalTitle.textContent = isEditing ? "تعديل العادة" : "إضافة عادة";
    els.habitName.value = habit.name;
    els.habitDescription.value = habit.description || "";
    els.deleteHabitBtn.classList.toggle("hidden", !isEditing);
    els.habitModal.classList.remove("hidden");
    els.habitName.focus();
  }

  function closeHabitModal() {
    els.habitModal.classList.add("hidden");
    editingHabitIndex = null;
  }

  function saveHabit() {
    const name = els.habitName.value.trim();
    const description = els.habitDescription.value.trim();

    if (!name) {
      showToast("اكتب اسم العادة.");
      return;
    }

    const habit = { name, description };

    if (editingHabitIndex === null) {
      state.habits.push(habit);
    } else {
      state.habits[editingHabitIndex] = habit;
    }

    saveState();
    closeHabitModal();
    renderAll();
    showToast("تم حفظ العادة.");
  }

  function deleteHabit() {
    if (editingHabitIndex === null) return;

    const confirmed = window.confirm("هل تريد حذف هذه العادة؟");
    if (!confirmed) return;

    state.habits.splice(editingHabitIndex, 1);

    const nextChecks = {};
    Object.entries(state.checks).forEach(([key, value]) => {
      const [habitIndex, day] = key.split("-").map(Number);

      if (habitIndex < editingHabitIndex) {
        nextChecks[key] = value;
      } else if (habitIndex > editingHabitIndex) {
        nextChecks[`${habitIndex - 1}-${day}`] = value;
      }
    });

    state.checks = nextChecks;
    saveState();
    closeHabitModal();
    renderAll();
    showToast("تم حذف العادة.");
  }

  function openProfileModal() {
    els.profileName.value = user.name || "";
    els.profilePhone.value = user.phone || "";
    els.profileAddress.value = user.address || "";
    els.profileModal.classList.remove("hidden");
  }

  function closeProfileModal() {
    els.profileModal.classList.add("hidden");
  }

  function saveProfile() {
    user = {
      ...user,
      name: els.profileName.value.trim() || user.name,
      phone: els.profilePhone.value.trim(),
      address: els.profileAddress.value.trim()
    };

    const nextUsers = getUsers();
    nextUsers[sessionEmail] = user;
    saveUsers(nextUsers);
    renderUser();
    closeProfileModal();
    showToast("تم حفظ الحساب.");
  }

  function polar(cx, cy, radius, degree) {
    const angle = (degree * Math.PI) / 180;
    return {
      x: cx + radius * Math.cos(angle),
      y: cy + radius * Math.sin(angle)
    };
  }

  function arcPath(cx, cy, r1, r2, a0, a1) {
    const p1 = polar(cx, cy, r2, a0);
    const p2 = polar(cx, cy, r2, a1);
    const p3 = polar(cx, cy, r1, a1);
    const p4 = polar(cx, cy, r1, a0);
    const largeArc = a1 - a0 > 180 ? 1 : 0;

    return [
      `M ${p1.x} ${p1.y}`,
      `A ${r2} ${r2} 0 ${largeArc} 1 ${p2.x} ${p2.y}`,
      `L ${p3.x} ${p3.y}`,
      `A ${r1} ${r1} 0 ${largeArc} 0 ${p4.x} ${p4.y}`,
      "Z"
    ].join(" ");
  }

  function createSvg(tag, attributes) {
    const element = document.createElementNS("http://www.w3.org/2000/svg", tag);
    Object.entries(attributes).forEach(([key, value]) => {
      element.setAttribute(key, String(value));
    });
    return element;
  }

  function escapeHtml(value) {
    return String(value).replace(/[&<>"']/g, (character) => ({
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      '"': "&quot;",
      "'": "&#039;"
    })[character]);
  }
})();
</script>
</body>
</html>
