<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>روتين هاني | Hani Routine</title>
<style>
:root{--bg:#0B1020;--panel:#111827;--panel2:#172033;--line:#26334d;--text:#F8FAFC;--muted:#AAB4C4;--purple:#7C3AED;--green:#22C55E;--amber:#F59E0B;--cyan:#06B6D4}
*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:Segoe UI,Tahoma,Arial,sans-serif;background:radial-gradient(circle at 15% 10%,rgba(124,58,237,.23),transparent 28%),radial-gradient(circle at 85% 90%,rgba(34,197,94,.16),transparent 28%),var(--bg);color:var(--text)}
button,input{font:inherit}.page{min-height:100vh;display:grid;grid-template-columns:1.1fr .9fr}.hero{padding:48px;display:flex;flex-direction:column;justify-content:space-between;background:linear-gradient(135deg,rgba(124,58,237,.16),rgba(6,182,212,.05))}.brand{display:flex;gap:14px;align-items:center}.brand img{width:52px}.brand h1{margin:0;font-size:30px}.brand p{margin:3px 0 0;color:var(--muted)}.hero h2{font-size:clamp(46px,6vw,88px);line-height:1.02;margin:0;letter-spacing:-3px}.hero h2 span{color:var(--green)}.hero-copy{max-width:700px;color:var(--muted);font-size:17px;line-height:1.9}.preview{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;max-width:520px}.preview i{height:12px;border-radius:999px;background:#2B354A}.preview i:nth-child(-n+2){background:var(--green)}.preview i:nth-child(3){background:var(--purple)}.auth-wrap{display:grid;place-items:center;padding:28px}.card{width:min(480px,100%);background:rgba(17,24,39,.94);border:1px solid var(--line);border-radius:28px;padding:28px;box-shadow:0 30px 80px rgba(0,0,0,.35)}.tabs{display:grid;grid-template-columns:1fr 1fr;padding:5px;background:#0c1220;border-radius:14px;gap:6px}.tab{border:0;padding:11px;border-radius:10px;background:transparent;color:var(--muted);font-weight:800;cursor:pointer}.tab.active{background:var(--purple);color:white}.heading{margin:24px 0}.heading h2{margin:0 0 7px;font-size:30px}.heading p{margin:0;color:var(--muted)}.field{margin-bottom:14px}.field label{display:block;margin-bottom:7px;color:#D5DCEC;font-size:13px}.field input{width:100%;padding:13px;border-radius:13px;border:1px solid var(--line);background:#0c1220;color:white;outline:none}.field input:focus{border-color:var(--purple);box-shadow:0 0 0 3px rgba(124,58,237,.18)}.primary{width:100%;border:0;padding:13px;border-radius:13px;background:linear-gradient(90deg,var(--purple),#9F67FF);color:white;font-weight:900;cursor:pointer}.note{font-size:12px;color:var(--muted);line-height:1.7;margin-top:14px}.hidden{display:none!important}.toast{position:fixed;bottom:20px;left:50%;transform:translate(-50%,24px);opacity:0;background:var(--green);color:#052e16;padding:11px 16px;border-radius:12px;font-weight:900;transition:.2s}.toast.show{opacity:1;transform:translate(-50%,0)}@media(max-width:900px){.page{grid-template-columns:1fr}.hero{display:none}}
</style>
</head>
<body>
<main class="page">
<section class="hero">
<div class="brand"><img src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMjAgMTIwIj4KPGRlZnM+PGxpbmVhckdyYWRpZW50IGlkPSJnIiB4MT0iMCIgeTE9IjAiIHgyPSIxIiB5Mj0iMSI+PHN0b3Agc3RvcC1jb2xvcj0iIzdDM0FFRCIvPjxzdG9wIG9mZnNldD0iMSIgc3RvcC1jb2xvcj0iIzIyQzU1RSIvPjwvbGluZWFyR3JhZGllbnQ+PC9kZWZzPgo8cmVjdCB3aWR0aD0iMTIwIiBoZWlnaHQ9IjEyMCIgcng9IjMyIiBmaWxsPSJ1cmwoI2cpIi8+CjxwYXRoIGQ9Ik0yOCA4MlYzOGgxNHYxNmgyMlYzOGgxNHY0NEg2NFY2Nkg0MnYxNkgyOFoiIGZpbGw9IndoaXRlIi8+CjxjaXJjbGUgY3g9IjkyIiBjeT0iMjgiIHI9IjEwIiBmaWxsPSIjRjU5RTBCIi8+Cjwvc3ZnPg=="><div><h1>روتين هاني</h1><p>Hani Routine</p></div></div>
<div><h2>ابنِ يومك.<br><span>غيّر حياتك.</span></h2><p class="hero-copy">تابع عاداتك، صور تقدمك، أهدافك، قياساتك وتحليلك الشهري في مكان واحد.</p></div>
<div class="preview"><i></i><i></i><i></i><i></i></div>
</section>
<section class="auth-wrap">
<div class="card">
<div class="tabs"><button id="loginTab" class="tab active">تسجيل الدخول</button><button id="registerTab" class="tab">إنشاء حساب</button></div>
<div class="heading"><h2 id="title">مرحبًا بعودتك</h2><p id="subtitle">ادخل إلى لوحة روتين هاني.</p></div>
<form id="form">
<div id="nameWrap" class="field hidden"><label>الاسم الكامل</label><input id="name"></div>
<div class="field"><label>البريد الإلكتروني</label><input id="email" type="email"></div>
<div class="field"><label>كلمة المرور</label><input id="password" type="password"></div>
<button id="submit" class="primary">دخول</button>
</form>
<p class="note">هذه النسخة تحفظ بياناتك محليًا داخل المتصفح.</p>
</div>
</section>
</main>
<div id="toast" class="toast"></div>
<script>
(()=>{"use strict";const UK="hr_users",SK="hr_session";let mode="login";const $=s=>document.querySelector(s),users=()=>{try{return JSON.parse(localStorage.getItem(UK)||"{}")}catch{return{}}},save=u=>localStorage.setItem(UK,JSON.stringify(u)),toast=t=>{$("#toast").textContent=t;$("#toast").classList.add("show");setTimeout(()=>$("#toast").classList.remove("show"),1700)};function setMode(m){mode=m;$("#loginTab").classList.toggle("active",m==="login");$("#registerTab").classList.toggle("active",m==="register");$("#nameWrap").classList.toggle("hidden",m==="login");$("#title").textContent=m==="login"?"مرحبًا بعودتك":"أنشئ حسابك";$("#subtitle").textContent=m==="login"?"ادخل إلى لوحة روتين هاني.":"ابدأ رحلتك اليوم.";$("#submit").textContent=m==="login"?"دخول":"إنشاء الحساب"}$("#loginTab").onclick=()=>setMode("login");$("#registerTab").onclick=()=>setMode("register");$("#form").onsubmit=e=>{e.preventDefault();const n=$("#name").value.trim(),em=$("#email").value.trim().toLowerCase(),p=$("#password").value;if(!em||!p)return toast("أكمل البيانات");let u=users();if(mode==="register"){if(!n)return toast("اكتب الاسم");if(u[em])return toast("الحساب موجود");u[em]={name:n,email:em,password:p,phone:"",address:""};save(u)}else if(!u[em]||u[em].password!==p)return toast("بيانات الدخول غير صحيحة");localStorage.setItem(SK,em);location.href="dashboard.html"};const s=localStorage.getItem(SK);if(s&&users()[s])location.href="dashboard.html"})();
</script>
</body></html>
